# SPDX-License-Identifier: MIT
# Recursive dogfooding — REAL (per DR-2026-06-19 dogfooding-enforcement-mandate,
# INS-012, LP-003 "published-not-enforced"): the toolkit RUNS the consistency
# validators it ships AND tests them. The 2026-06-19 audit named this repo's
# central contradiction — "a validator toolkit with no test of its validators."
# A prescribed gate that does not execute is a build failure, not a header comment.
name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least-privilege GITHUB_TOKEN (defense-in-depth; every step here only reads).
permissions:
  contents: read
  pull-requests: read

# Layer B.2 — concurrency cancel-in-progress (dominant cost lever, P9)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Layer B.2 — aggregation-required-gate: a single required check.
  ci-gate:
    if: github.event.pull_request.draft == false   # Layer B.2 draft-skip
    runs-on: ubuntu-latest
    steps:
      - name: DCO sign-off check (every non-merge commit Signed-off-by its author)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          gh api --paginate "repos/$PR_REPO/pulls/$PR_NUM/commits" \
            --jq '.[] | select((.parents|length) < 2) | [.sha[0:8], .commit.author.name, .commit.author.email, (.commit.message|@base64)] | @tsv' \
          | python3 -c '
          import base64, sys
          bad = []
          for line in sys.stdin:
              parts = line.rstrip("\n").split("\t")
              if len(parts) < 4:
                  continue
              sha, name, email, msg_b64 = parts[0], parts[1], parts[2], parts[3]
              msg = base64.b64decode(msg_b64).decode("utf-8", "replace")
              if f"signed-off-by: {name} <{email}>".lower() not in msg.lower():
                  bad.append((sha, name, email))
          if bad:
              print("::error::Missing DCO sign-off. Add it with:  git commit -s   (or  git rebase --signoff origin/main).")
              for sha, name, email in bad:
                  print(f"  - {sha}: needs  Signed-off-by: {name} <{email}>")
              sys.exit(1)
          print("DCO: all non-merge commits signed off by their author")
          '
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: B.2 guardrail templates present (structure smoke)
        run: |
          set -e
          for f in concurrency-cancel change-scoped-gating aggregation-required-gate draft-skip dependency-cache; do
            test -f "templates/ci-guardrails/$f.yml" || { echo "::error::missing guardrail template: $f.yml"; exit 1; }
          done
          test -f templates/cost-ledger/cost-ledger-template.md
          echo "templates present: PASS"

      - name: Evidence schema sync gate (vendored copy == spec canonical)
        # The evidence-schema check validates against the VENDORED copy of the
        # canonical evidence.v1 schema. Drift between it and spec main is the
        # denormalized-copy failure mode this toolkit exists to catch — same
        # philosophy as the website's license-sync gate. Byte-compare; on
        # drift, re-vendor from the spec (the spec is canonical, never edit
        # the vendored copy by hand).
        run: |
          curl -fsSL --retry 3 \
            https://raw.githubusercontent.com/SliceOps/spec/main/reference/evidence/evidence.v1.schema.json \
            -o /tmp/evidence.v1.schema.canonical.json
          cmp /tmp/evidence.v1.schema.canonical.json \
            templates/consistency-validators/schemas/evidence.v1.schema.json \
            || { echo "::error::vendored evidence.v1 schema drifted from spec canonical — re-vendor from SliceOps/spec reference/evidence/evidence.v1.schema.json"; exit 1; }
          echo "evidence schema sync: PASS"

      - name: Test the validators, stdlib-only (regression suite — a validator toolkit must test its validators)
        # No optional deps installed: exercises the PyYAML and jsonschema
        # stdlib fallbacks (the jsonschema-mode test class self-skips here).
        run: python3 -m unittest discover -s tests -v

      - name: Test the validators again with the optional deps (PyYAML + jsonschema)
        # Same suite, full modes: robust YAML parsing + full Draft 2020-12
        # evidence validation. Green with AND without the optional deps is the
        # contract (v0.1.1 discipline, extended to jsonschema in v0.2.0).
        run: |
          python3 -m pip install --quiet pyyaml jsonschema
          python3 -m unittest discover -s tests -v

      - name: Run the validators on this repo (self-application)
        # --checks all: this repo has no DEC corpus or topic taxonomy, so
        # topic-tags reports SKIPPED (green) and the DEC checks pass vacuously.
        # evidence-schema is exercised for REAL: tests/fixtures/evidence/ ships
        # the two VALID golden records as *.evidence.json (discovered, must
        # validate) while the three deliberately-INVALID fixtures keep their
        # *.example.* names (excluded from discovery by design).
        run: |
          python3 templates/consistency-validators/validators.py --root . --checks all

      - name: Secrets scan (gitleaks)
        # Working-tree scan; fails the job on any finding. Pinned image for
        # reproducibility. P7 Security-by-Construction.
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.18.4 \
            detect --source=/repo --no-git --redact -v
